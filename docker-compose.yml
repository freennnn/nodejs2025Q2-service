version: '3.8'

# Default Development Environment with Hot Reloading
#
# Usage:
#   docker-compose up --build
#
# Features:
#   - Hot reloading on file changes in src/
#   - Development mode with all dependencies
#   - Volume mounts for live development
#   - Auto-restart on code changes

services:
  # PostgreSQL Database
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: home-library-postgres
    environment:
      POSTGRES_DB: home-library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432' # Standard PostgreSQL port
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_logs:/var/log/postgresql # Database logs in volume
    networks:
      - home-library-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d home-library']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NestJS Application with Hot Reloading
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development # Use development stage for hot reloading
    container_name: home-library-app
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/home-library?schema=public
    ports:
      - '4000:4000' # Standard app port
    volumes:
      # Mount source code for hot reloading
      - ./src:/app/src:ro # Source code (read-only)
      - ./prisma:/app/prisma:ro # Prisma schema
      - ./package.json:/app/package.json:ro # Package.json
      - ./tsconfig.json:/app/tsconfig.json:ro # TypeScript config
      - ./nest-cli.json:/app/nest-cli.json:ro # Nest CLI config
      # Exclude node_modules to avoid conflicts
      - /app/node_modules
      - /app/dist
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - home-library-network
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:4000/user',
          '||',
          'exit',
          '1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

# Named volumes
volumes:
  postgres_data:
    driver: local
  postgres_logs:
    driver: local

# Custom network
networks:
  home-library-network:
    driver: bridge
    name: home-library-network
