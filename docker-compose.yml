version: '3.8'

# Development Docker Compose - Builds Images Locally
# Used for development and local testing with source code changes
#
# Usage:
#   docker-compose up --build -d
#
# Features:
#   - Builds optimized images from local source code
#   - Supports live development with code changes
#   - Local testing and debugging
#   - Same production configuration but with local builds

services:
  # PostgreSQL Database
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: home-library-postgres
    environment:
      POSTGRES_DB: home-library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432' # Standard PostgreSQL port
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - home-library-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d home-library']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NestJS Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: home-library-app
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/home-library?schema=public
    ports:
      - '4000:4000' # Standard app port
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - home-library-network
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:4000/user',
          '||',
          'exit',
          '1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

# Named volumes
volumes:
  postgres_data:
    driver: local

# Custom network
networks:
  home-library-network:
    driver: bridge
    name: home-library-network
