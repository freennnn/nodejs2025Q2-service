# Default Development Environment with Hot Reloading
#
# Usage:
#   docker-compose up --build
#
# Required Environment Variables:
#   POSTGRES_DB (default: home-library)
#   POSTGRES_USER (default: postgres)
#   POSTGRES_PASSWORD (default: postgres)
#   POSTGRES_PORT (default: 5432)
#   PORT (default: 4000)
#   NODE_ENV (default: development)
#
# Features:
#   - Hot reloading on file changes in src/
#   - Development mode with all dependencies
#   - Volume mounts for live development
#   - Auto-restart on code changes

services:
  # PostgreSQL Database
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: ${POSTGRES_CONTAINER_NAME:-home-library-postgres}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-home-library}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_logs:/var/log/postgresql
    networks:
      - ${NETWORK_NAME:-home-library-network}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-home-library}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NestJS Application with Hot Reloading
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: ${APP_CONTAINER_NAME:-home-library-app}
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-4000}
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-home-library}?schema=public}
    ports:
      - '${PORT:-4000}:${PORT:-4000}'
    volumes:
      # Mount source code for hot reloading
      - ./src:/app/src:ro
      - ./prisma:/app/prisma:ro
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./nest-cli.json:/app/nest-cli.json:ro
      # Mount dist directory for compiled output
      - ./dist:/app/dist
      # Exclude node_modules to avoid conflicts
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ${NETWORK_NAME:-home-library-network}
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:${PORT:-4000}/user',
          '||',
          'exit',
          '1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  postgres_logs:
    driver: local

networks:
  home-library-network:
    driver: bridge
    name: ${NETWORK_NAME:-home-library-network}
