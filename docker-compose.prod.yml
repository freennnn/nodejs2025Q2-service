# Production Docker Compose - Uses Docker Hub Images
# No local building required - pulls optimized images from Docker Hub
#
# Usage:
#   docker-compose -f docker-compose.production.yml up -d
#
# Features:
#   - Uses pre-built optimized images from Docker Hub
#   - Faster deployment (no build time)
#   - Consistent across environments
#   - Production-ready configuration

services:
  # PostgreSQL Database from Docker Hub
  postgres:
    image: freennnn/nodejs2025q2-service-postgres:latest
    container_name: home-library-postgres-prod
    environment:
      POSTGRES_DB: home-library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432' # Standard PostgreSQL port
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - postgres_logs_prod:/var/log/postgresql # Database logs in volume
    networks:
      - home-library-network-prod
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d home-library']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NestJS Application from Docker Hub
  app:
    image: freennnn/nodejs2025q2-service-app:latest
    container_name: home-library-app-prod
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/home-library?schema=public
    ports:
      - '4000:4000' # Standard app port
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - home-library-network-prod
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:4000/user',
          '||',
          'exit',
          '1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

# Production volumes (persistent data)
volumes:
  postgres_data_prod:
    driver: local
  postgres_logs_prod:
    driver: local

# Production network (isolated)
networks:
  home-library-network-prod:
    driver: bridge
